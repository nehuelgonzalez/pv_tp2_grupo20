<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let numero= prompt("Ingrese un numero: ")
        if (numero % 2 === 0) {
            document.write(`El numero ${numero} es par`)
        
        } else{
            document.write(`El numero ${numero} es impar`);
        }
    </script>
</body>
</html>
