<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 11</title>
</head>

<body>
    <script>
        let km = parseFloat(prompt("Ingrese los kilómetros recorridos:"));
        let litros = parseFloat(prompt("Ingrese los litros consumidos:"));

        let consumido = litros / km;

        document.write(`El consumo por kilómetro es: ${consumido.toFixed(2)} litros/km`);
    </script>
</body>

</html>
